name = "jarvis-router"
main = "src/index.ts"
compatibility_date = "2026-07-07"
compatibility_flags = ["nodejs_compat"]
account_id = "6872653edcee9c791787c1b783173793"

[observability]
enabled = true

[assets]
directory = "./public"
not_found_handling = "404-page"

# ─── Service Bindings ────────────────────────────────────────────────────────

[[services]]
binding = "ORACLE_WORKER"
service = "ichingoracle"

[[services]]
binding = "GLOBE_WORKER"
service = "openjarvis-kingwen-globe"

# ─── KV (reuse POG2_SOVEREIGN) ───────────────────────────────────────────────

[[kv_namespaces]]
binding = "POG2_SOVEREIGN"
id = "06bb2cad53044973b59cdc9c97551402"

# ─── Queue (training export → pog2-collapse-events) ─────────────────────────

[[queues.producers]]
binding = "POG2_COLLAPSE_QUEUE"
queue = "pog2-collapse-events"

# ─── Secrets (set via: wrangler secret put JARVIS_ROUTER_TOKEN) ─────────────
# JARVIS_ROUTER_TOKEN — Bearer token for GET /secrets/endpoints
# Set with: wrangler secret put JARVIS_ROUTER_TOKEN --name jarvis-router

# ─── Dev port ────────────────────────────────────────────────────────────────

[dev]
port = 8790
local_protocol = "http"
