<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>King Wen — Membrane Path Live</title>
<style>
  :root {
    bg: #0b0c10;
    panel: #1f2833;
    dim: #c5c6c7;
    cyan: #66fcf1;
    magenta: #ff00ff;
    yellow: #ffd700;
    green: #45a29e;
    red: #ff2e63;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: #0b0c10;
    color: #c5c6c7;
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    font-size: 14px;
    line-height: 1.45;
  }
  header {
    position: sticky; top: 0; z-index: 5;
    background: #0b0c10f0;
    border-bottom: 1px solid #1f2833;
    padding: 14px 18px;
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
  }
  header h1 {
    margin: 0; font-size: 16px; letter-spacing: 0.18em; text-transform: uppercase;
    color: #66fcf1;
  }
  .pill {
    border: 1px solid #45a29e;
    color: #45a29e;
    padding: 4px 8px; border-radius: 999px; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
  }
  .pill.off { border-color: #ff2e63; color: #ff2e63; }
  .pill.on { border-color: #66fcf1; color: #66fcf1; }
  main { padding: 18px; display: grid; gap: 18px; }
  .panel {
    background: #1f2833;
    border: 1px solid #2b3542;
    border-radius: 12px;
    padding: 14px 16px;
  }
  .panel h2 {
    margin: 0 0 10px 0; font-size: 12px; letter-spacing: 0.22em;
    text-transform: uppercase; color: #66fcf1; font-weight: 600;
  }
  .row { display: flex; flex-wrap: wrap; gap: 14px; }
  .tile { flex: 1 1 220px; }
  label { display: block; font-size: 10px; text-transform: uppercase; letter-spacing: 0.18em; color: #8e9aaf; margin-bottom: 6px; }
  input[type="text"], input[type="number"] {
    width: 100%;
    background: #0b0c10; color: #c5c6c7; border: 1px solid #2b3542; border-radius: 8px;
    padding: 8px 10px; font-family: inherit; font-size: 13px;
  }
  button {
    background: #45a29e; color: #0b0c10; border: none; border-radius: 8px;
    padding: 9px 14px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase;
    cursor: pointer;
  }
  button.secondary { background: #2b3542; color: #c5c6c7; }
  button:hover { filter: brightness(1.08); }
  .meter {
    height: 10px; border-radius: 999px; background: #0b0c10; overflow: hidden; border: 1px solid #2b3542;
  }
  .meter > div { height: 100%; border-radius: 999px; background: linear-gradient(90deg,#45a29e,#66fcf1); width: 0%; transition: width 0.25s ease; }
  .metric { font-size: 22px; font-weight: 700; color: #ffd700; }
  .meta { font-size: 11px; color: #8e9aaf; }
  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: 7px 9px; border-bottom: 1px solid #2b3542; vertical-align: top; }
  th { color: #66fcf1; font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; }
  td { color: #c5c6c7; }
  tr:hover td { background: #1f283388; }
  .nowrap { white-space: nowrap; }
  .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
  .muted { color: #8e9aaf; }
  .good { color: #66fcf1; }
  .warn { color: #ffd700; }
  .bad { color: #ff2e63; }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  .live { animation: pulse 1.6s ease-in-out infinite; color: #66fcf1; }
  @media (max-width: 980px) {
    .row { flex-direction: column; }
  }
</style>
</head>
<body>
<header>
  <h1>🌊 King Wen — Membrane Path Live</h1>
  <span class="pill" id="wsStatus">WS: closed</span>
  <span class="pill on" id="eventCount">Events: 0</span>
  <span class="pill" id="lastMode">Mode: —</span>
  <button class="secondary" id="replayBtn">Replay last 50</button>
  <button id="clearBtn">Clear</button>
</header>

<main>
  <section class="panel">
    <h2>Controls / Source</h2>
    <div class="row">
      <div class="tile">
        <label for="wsUrl">Event source</label>
        <input id="wsUrl" type="text" value="ws://localhost:8000/v1/agents/events" />
      </div>
      <div class="tile">
        <label for="token">Auth token (optional)</label>
        <input id="token" type="text" value="" />
      </div>
      <div class="tile" style="display:flex; align-items:flex-end;">
        <button id="connectBtn">Connect</button>
      </div>
    </div>
  </section>

  <section class="panel">
    <h2>Live metrics</h2>
    <div class="row">
      <div class="tile">
        <label>Porosity</label>
        <div class="metric" id="porosityVal">—</div>
        <div class="meter"><div id="porosityBar"></div></div>
      </div>
      <div class="tile">
        <label>Autonomy</label>
        <div class="metric" id="autonomyVal">—</div>
        <div class="meter"><div id="autonomyBar"></div></div>
      </div>
      <div class="tile">
        <label>Memory sync</label>
        <div class="metric" id="syncVal">—</div>
        <div class="meta">seconds; 0 = immediate</div>
      </div>
      <div class="tile">
        <label>Swarm</label>
        <div class="metric" id="swarmVal">—</div>
      </div>
    </div>
  </section>

  <section class="panel">
    <h2>Consensus stream — latest 50</h2>
    <div style="overflow:auto;">
      <table>
        <thead>
          <tr>
            <th>Time</th>
            <th>Agent</th>
            <th>Hexagram</th>
            <th>Phase</th>
            <th>Porosity</th>
            <th>Coherence / Chaos / Whimsy / Dark</th>
            <th>Mode</th>
            <th>Trajectory</th>
            <th>Swarm</th>
          </tr>
        </thead>
        <tbody id="streamBody"></tbody>
      </table>
      <div id="emptyHint" class="muted" style="padding:10px 2px;">Waiting for kingwen_consensus_update events…</div>
    </div>
  </section>
</main>

<script>
(() => {
  const $ = (id) => document.getElementById(id);
  const wsUrlInput = $('wsUrl');
  const tokenInput = $('token');
  const connectBtn = $('connectBtn');
  const clearBtn = $('clearBtn');
  const replayBtn = $('replayBtn');
  const wsStatus = $('wsStatus');
  const eventCount = $('eventCount');
  const lastMode = $('lastMode');
  const streamBody = $('streamBody');
  const emptyHint = $('emptyHint');

  let ws = null;
  let total = 0;

  function setStatus(text, ok) {
    wsStatus.textContent = text;
    wsStatus.classList.toggle('on', ok);
    wsStatus.classList.toggle('off', !ok);
  }

  function fmt(v, digits=3) {
    if (v === null || v === undefined || v === '') return '—';
    const n = Number(v);
    if (!Number.isFinite(n)) return String(v);
    return n.toFixed(digits);
  }

  function barPct(v) {
    const n = Number(v);
    if (!Number.isFinite(n)) return 0;
    return Math.max(0, Math.min(100, Math.round(n * 100)));
  }

  function colorPorosity(p) {
    const n = Number(p);
    if (!Number.isFinite(n)) return '';
    if (n < 0.3) return 'warn';
    if (n < 0.8) return 'good';
    return 'bad';
  }
  function colorMode(m) {
    if (m === 'whisper') return 'warn';
    if (m === 'suggest') return 'good';
    if (m === 'command') return 'bad';
    return '';
  }

  function renderMetrics(data) {
    $('porosityVal').textContent = fmt(data.porosity, 2);
    $('porosityBar').style.width = barPct(data.porosity) + '%';
    $('autonomyVal').textContent = fmt(data.agent_autonomy, 2);
    $('autonomyBar').style.width = barPct(data.agent_autonomy) + '%';
    $('syncVal').textContent = data.memory_sync_interval == null ? '—' : (Number(data.memory_sync_interval) === 0 ? '0 (immediate)' : fmt(data.memory_sync_interval, 1) + 's');
    const swarm = data.swarm_broadcast_enabled;
    $('swarmVal').textContent = swarm ? 'ON' : 'OFF';
    $('swarmVal').className = 'metric ' + (swarm ? 'bad' : 'muted');
    const mode = data.kingwen_broadcast_mode || data.broadcast_mode || '—';
    lastMode.textContent = 'Mode: ' + mode;
    lastMode.className = 'pill ' + (colorMode(mode) || 'on');
  }

  function appendRow(data) {
    if (emptyHint) emptyHint.style.display = 'none';
    const tr = document.createElement('tr');
    const now = new Date((data.timestamp || Date.now() / 1000) * 1000);
    const time = now.toLocaleTimeString();
    const hex = [data.hexagram_id, data.hexagram_name ? '(' + data.hexagram_name + ')' : ''].filter(Boolean).join(' ') || '—';
    const ed = data.emotional_deltas || {};
    const vectors = data.training_weight_vectors || {};
    const v = (k) => {
      const a = ed[k];
      const b = vectors[k];
      const n = Number(a ?? b);
      return Number.isFinite(n) ? fmt(n, 2) : '—';
    };
    const mode = data.kingwen_broadcast_mode || data.broadcast_mode || '—';
    const trajectory = data.trajectory || '—';
    const swarm = data.swarm_broadcast_enabled == null ? '—' : (data.swarm_broadcast_enabled ? 'ON' : 'OFF');
    tr.innerHTML = `
      <td class="nowrap mono muted">${time}</td>
      <td class="nowrap mono">${data.agent || '—'}</td>
      <td class="nowrap mono">${hex}</td>
      <td>${data.phase_temporal || '—'}</td>
      <td class="mono ${colorPorosity(data.porosity)}">${fmt(data.porosity, 2)}</td>
      <td class="mono">${v('coherence')} / ${v('chaos')} / ${v('whimsy')} / ${v('darkTone')}</td>
      <td class="mono ${colorMode(mode)}">${mode}</td>
      <td>${trajectory}</td>
      <td class="mono ${swarm === 'ON' ? 'bad' : 'muted'}">${swarm}</td>
    `;
    streamBody.prepend(tr);
    total++;
    eventCount.textContent = 'Events: ' + total;
    while (streamBody.children.length > 50) streamBody.lastElementChild.remove();
    renderMetrics(data);
  }

  function normalize(data) {
    if (!data || typeof data !== 'object') return null;
    const out = { ...data };
    if (out.emotional_tongue && typeof out.emotional_tongue === 'object') {
      out.training_weight_vectors = out.emotional_tongue.training_weight_vectors || out.training_weight_vectors || {};
      out.emotional_deltas = out.emotional_tongue.emotional_deltas || out.emotional_deltas || {};
    }
    if (!out.training_weight_vectors) out.training_weight_vectors = {};
    if (!out.emotional_deltas) out.emotional_deltas = {};
    return out;
  }

  function handleMessage(raw) {
    let obj;
    try { obj = JSON.parse(raw); } catch { return; }
    const data = normalize(obj.data || obj);
    if (!data) return;
    const type = String(obj.event_type || data.type || '').toLowerCase();
    if (!type.includes('kingwen') && !type.includes('consensus')) return;
    appendRow(data);
  }

  function connect() {
    if (ws) { try { ws.close(); } catch {} }
    const url = wsUrlInput.value.trim();
    if (!url) { setStatus('WS: empty', false); return; }
    setStatus('WS: connecting…', true);
    try {
      ws = new WebSocket(url);
    } catch (e) {
      setStatus('WS: error', false); return;
    }
    ws.onopen = () => setStatus('WS: live', true);
    ws.onmessage = (ev) => {
      try { handleMessage(ev.data); } catch {}
    };
    ws.onerror = () => setStatus('WS: error', false);
    ws.onclose = () => setStatus('WS: closed', false);
  }

  connectBtn.addEventListener('click', connect);
  clearBtn.addEventListener('click', () => {
    streamBody.innerHTML = '';
    total = 0;
    eventCount.textContent = 'Events: 0';
    if (emptyHint) emptyHint.style.display = '';
    $('porosityVal').textContent = '—';
    $('porosityBar').style.width = '0%';
    $('autonomyVal').textContent = '—';
    $('autonomyBar').style.width = '0%';
    $('syncVal').textContent = '—';
    $('swarmVal').textContent = '—';
    $('swarmVal').className = 'metric muted';
    lastMode.textContent = 'Mode: —';
    lastMode.className = 'pill on';
  });
  replayBtn.addEventListener('click', async () => {
    const url = wsUrlInput.value.trim();
    if (!url) return;
    try {
      const base = url.replace(/^ws/, 'http');
      const res = await fetch(base + '/kingwen/swarm/latest', { headers: { 'Accept': 'application/json' } });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const rows = await res.json();
      if (!Array.isArray(rows)) return;
      rows.forEach((r) => appendRow(normalize(r) || r));
    } catch (e) {
      window.alert('Replay failed: ' + e.message);
    }
  });
  // Auto-connect if server is reachable on default localhost.
  window.addEventListener('load', () => {
    const url = wsUrlInput.value.trim();
    if (url && (url.includes('localhost') || url.includes('127.0.0.1'))) {
      connect();
    }
  });
})();
</script>
</body>
</html>
